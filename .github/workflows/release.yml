name: Release

# Two ways to ship a release:
#
#   1. Automatic: push to main with a bumped stream_viewer/_version.py. The
#      `plan` job notices the version has no release yet and runs the full
#      pipeline, creating the vX.Y.Z tag (via `gh release create`) once
#      everything else has succeeded.
#   2. Manual: push a `vX.Y.Z` tag yourself. `plan` then strictly validates
#      the tag matches `_version.py` and that no release for it exists yet,
#      failing fast (and loudly) if not.
#
# Pipeline:
#   plan -> test -----------\
#        \                   -> build-catalog -> build-windows -\
#         -----------------/                  -> build-linux   -> publish-release
#                                             -> build-macos  -/
#
# If `plan` decides there's nothing new to release (main push, version
# unchanged), every downstream job is skipped and the run finishes green —
# no noisy failure notification for routine pushes. A real test failure or
# tag/version mismatch still fails the run loudly, notifying whoever pushed.
on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  plan:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      should_release: ${{ steps.resolve.outputs.should_release }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve target tag and whether a release is needed
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code_version="$(grep -oP '(?<=__version__ = ")[^"]+' stream_viewer/_version.py)"
          tag="v${code_version}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Manual tag push: the tag must match the code, and must be new.
            if [ "${GITHUB_REF_NAME}" != "${tag}" ]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match stream_viewer/_version.py (${code_version}). Bump _version.py to match before tagging."
              exit 1
            fi
            if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              echo "::error::A release for ${tag} already exists. Bump stream_viewer/_version.py to a new version and tag again."
              exit 1
            fi
            should_release=true
            echo "Tag ${tag} is new — proceeding with release."
          else
            # Automatic path (push to main): only release if this version is new.
            if gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
              should_release=false
              echo "Release ${tag} already exists — nothing new to release for this push."
            else
              should_release=true
              echo "Version ${tag} has no release yet — running the release pipeline."
            fi
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "should_release=${should_release}" >> "$GITHUB_OUTPUT"

  test:
    needs: plan
    if: needs.plan.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv sync --group dev

      - run: uv run playwright install --with-deps chromium

      - run: uv run pytest -q --tb=short

  build-catalog:
    needs: [plan, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv sync

      - name: Build viewer.db (full catalog, incl. HLS probe — same as `make build-probed`)
        run: uv run stream-viewer-build --probe --probe-all --probe-workers 500 --probe-deep

      - uses: actions/upload-artifact@v7
        with:
          name: viewer-db
          path: iptv_export/viewer.db
          retention-days: 1

  build-windows:
    needs: [plan, build-catalog]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv sync --group packaging

      - uses: actions/download-artifact@v8
        with:
          name: viewer-db
          path: iptv_export

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm packaging/streaming_viewer_tv.spec

      - name: Assemble bundle folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/StreamingViewerTV/iptv_export | Out-Null
          Copy-Item iptv_export/viewer.db dist/StreamingViewerTV/iptv_export/viewer.db

      - name: Zip
        shell: pwsh
        run: Compress-Archive -Path dist/StreamingViewerTV -DestinationPath "StreamingViewerTV-${{ needs.plan.outputs.tag }}-windows-x64.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: windows-bundle
          path: StreamingViewerTV-${{ needs.plan.outputs.tag }}-windows-x64.zip
          retention-days: 1

  build-linux:
    needs: [plan, build-catalog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv sync --group packaging

      - uses: actions/download-artifact@v8
        with:
          name: viewer-db
          path: iptv_export

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm packaging/streaming_viewer_tv.spec

      - name: Assemble bundle folder
        run: |
          mkdir -p dist/StreamingViewerTV/iptv_export
          cp iptv_export/viewer.db dist/StreamingViewerTV/iptv_export/viewer.db
          chmod +x dist/StreamingViewerTV/StreamingViewerTV

      - name: Tar (preserves the executable bit; zip on Linux doesn't reliably)
        run: tar czf "StreamingViewerTV-${{ needs.plan.outputs.tag }}-linux-x86_64.tar.gz" -C dist StreamingViewerTV

      - uses: actions/upload-artifact@v7
        with:
          name: linux-bundle
          path: StreamingViewerTV-${{ needs.plan.outputs.tag }}-linux-x86_64.tar.gz
          retention-days: 1

  build-macos:
    needs: [plan, build-catalog]
    # Apple Silicon (arm64). Intel Macs are not covered by this job.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv sync --group packaging

      - uses: actions/download-artifact@v8
        with:
          name: viewer-db
          path: iptv_export

      - name: Build with PyInstaller
        run: uv run pyinstaller --noconfirm packaging/streaming_viewer_tv.spec

      - name: Assemble bundle folder
        run: |
          mkdir -p dist/StreamingViewerTV/iptv_export
          cp iptv_export/viewer.db dist/StreamingViewerTV/iptv_export/viewer.db
          chmod +x dist/StreamingViewerTV/StreamingViewerTV

      - name: Tar (preserves the executable bit)
        run: tar czf "StreamingViewerTV-${{ needs.plan.outputs.tag }}-macos-arm64.tar.gz" -C dist StreamingViewerTV

      - uses: actions/upload-artifact@v7
        with:
          name: macos-bundle
          path: StreamingViewerTV-${{ needs.plan.outputs.tag }}-macos-arm64.tar.gz
          retention-days: 1

  publish-release:
    needs: [plan, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: windows-bundle

      - uses: actions/download-artifact@v8
        with:
          name: linux-bundle

      - uses: actions/download-artifact@v8
        with:
          name: macos-bundle

      - name: Create GitHub release with all platform bundles attached
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
        run: |
          gh release create "${TAG}" \
            "StreamingViewerTV-${TAG}-windows-x64.zip" \
            "StreamingViewerTV-${TAG}-linux-x86_64.tar.gz" \
            "StreamingViewerTV-${TAG}-macos-arm64.tar.gz" \
            --title "${TAG}" \
            --generate-notes \
            --repo "${{ github.repository }}"
