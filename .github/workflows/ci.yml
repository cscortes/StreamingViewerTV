name: CI

# Runs the full test suite (incl. Playwright UI checks) on every push and PR
# against main, independent of releases — this is the "did we break anything"
# safety net. A red run here notifies the pusher via GitHub's default
# workflow-failure notifications.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2

      - run: uv sync --group dev

      - run: uv run playwright install --with-deps chromium

      - run: uv run pytest -q --tb=short
